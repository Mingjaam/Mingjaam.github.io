<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자기소개 추가 · 멋쟁이사자처럼 계명대</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px 60px;
    }

    .form-card {
      background: #121212;
      border-radius: 18px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.7);
      padding: 36px 32px;
      width: 100%;
      max-width: 520px;
      border: 1px solid rgba(255, 165, 0, 0.2);
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .back {
      background: #0e0e0e;
      border: 1px solid rgba(255, 152, 0, 0.25);
      color: #ffcc80;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .back:hover { background: #1a1a1a; }

    h1 { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #e0e0e0;
      margin-bottom: 6px;
    }
    label .req { color: #ff9800; margin-left: 2px; }

    input, select, textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      font-size: 14px;
      color: #f0f0f0;
      background: #181818;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #ff9800;
      background: #111;
    }
    select option { background: #1a1a1a; }
    textarea { resize: vertical; min-height: 90px; }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #ff9800, #ff5722);
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.08s ease, filter 0.15s;
    }
    button[type="submit"]:hover  { filter: brightness(1.1); }
    button[type="submit"]:active { transform: translateY(1px); }
    button[type="submit"]:disabled { background: #333; color: #666; cursor: not-allowed; filter: none; }

    .status {
      display: none;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      padding: 12px;
      border-radius: 12px;
      margin-top: 14px;
    }
    .status.success { background: rgba(76, 175, 80, 0.1); color: #81c784; border: 1px solid rgba(129, 199, 132, 0.4); }
    .status.error   { background: rgba(244, 67, 54, 0.1); color: #ef9a9a; border: 1px solid rgba(239, 154, 154, 0.4); }

    .loading-form {
      text-align: center;
      padding: 40px 0;
      color: #666;
      font-size: 14px;
    }

    @media (max-width: 520px) {
      body { padding: 24px 16px 48px; }
      .form-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="form-card">
    <div class="topbar">
      <button class="back" type="button" onclick="location.href='index.html'">← 카드로</button>
    </div>

    <h1>자기소개 추가</h1>
    <p class="subtitle">아래 항목을 작성하고 제출해 주세요.</p>

    <div id="formWrap">
      <p class="loading-form">폼을 불러오는 중...</p>
    </div>

    <div class="status" id="statusMsg"></div>
  </div>

  <script src="card-render.js"></script>
  <script>
    const formWrap  = document.getElementById("formWrap");
    const statusMsg = document.getElementById("statusMsg");

    function showStatus(text, type) {
      statusMsg.textContent = text;
      statusMsg.className = `status ${type}`;
      statusMsg.style.display = "block";
    }

    function buildInput(field) {
      const { id, type, options = [], required } = field;
      if (type === "image") return document.createElement("div");

      if (type === "select") {
        const sel = document.createElement("select");
        sel.id = sel.name = id;
        if (required) sel.required = true;
        sel.innerHTML = `<option value="">-- 선택해주세요 --</option>` +
          options.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join("");
        return sel;
      }

      if (type === "textarea") {
        const ta = document.createElement("textarea");
        ta.id = ta.name = id;
        ta.placeholder = field.label + " 입력";
        if (required) ta.required = true;
        return ta;
      }

      const inp = document.createElement("input");
      inp.type = "text";
      inp.id = inp.name = id;
      inp.placeholder = field.label + " 입력";
      if (required) inp.required = true;
      return inp;
    }

    function renderForm(fields) {
      const form = document.createElement("form");
      form.id = "introForm";

      fields.filter(f => f.type !== "image").forEach(field => {
        const group = document.createElement("div");
        group.className = "form-group";

        const label = document.createElement("label");
        label.htmlFor = field.id;
        label.innerHTML = escapeHtml(field.label) + (field.required ? '<span class="req">*</span>' : "");

        group.appendChild(label);
        group.appendChild(buildInput(field));
        form.appendChild(group);
      });

      const btn = document.createElement("button");
      btn.type = "submit";
      btn.id = "submitBtn";
      btn.textContent = "제출하기";
      form.appendChild(btn);

      formWrap.innerHTML = "";
      formWrap.appendChild(form);
      form.addEventListener("submit", handleSubmit);
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const btn  = form.querySelector("#submitBtn");

      const empties = [...form.querySelectorAll("[required]")].filter(el => !el.value.trim());
      if (empties.length) {
        const labelText = empties[0].previousElementSibling?.textContent.replace("*", "").trim() || "";
        showStatus(`"${labelText}"을(를) 입력해주세요.`, "error");
        empties[0].focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = "제출 중...";
      statusMsg.style.display = "none";

      const data = { action: "submit" };
      new FormData(form).forEach((v, k) => { if (typeof v === "string") data[k] = v; });

      try {
        const res  = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(data),
        });
        const json = await res.json();

        if (json.result === "success") {
          showStatus("✅ 제출 완료! 카드 화면으로 이동합니다.", "success");
          form.reset();
          setTimeout(() => { location.href = "index.html"; }, 800);
        } else {
          throw new Error(json.message || "서버 오류");
        }
      } catch (err) {
        console.error("제출 오류:", err);
        showStatus("❌ 제출 중 오류가 발생했습니다. 다시 시도해주세요.", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "제출하기";
      }
    }

    async function init() {
      try {
        const res  = await fetch(`${API_URL}?action=config`);
        const json = await res.json();
        if (json.result !== "success") throw new Error();
        renderForm(json.fields);
      } catch {
        formWrap.innerHTML = `<p class="loading-form">❌ 폼을 불러오지 못했습니다.<br>잠시 후 새로고침해주세요.</p>`;
      }
    }

    init();
  </script>
</body>
</html>
