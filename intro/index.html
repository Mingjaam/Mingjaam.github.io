<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>멋쟁이사자처럼 계명대</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    body { padding: 28px 16px 64px; }

    header { text-align: center; margin-bottom: 24px; }
    header h1 { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: -0.3px; }
    header p  { font-size: 13px; color: #888; margin-top: 6px; }

    .toolbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      max-width: 1200px;
      margin: 0 auto 20px;
    }
    .count { font-size: 13px; color: #777; padding: 0 4px; }

    @media (max-width: 520px) {
      body { padding: 18px 14px 56px; }
      header h1 { font-size: 20px; }
      .card.add { order: -1; }
    }
  </style>
</head>
<body>

  <header>
    <h1>멋쟁이사자처럼 계명대</h1>
    <p>자기소개 카드 리스트</p>
  </header>

  <div class="toolbar">
    <button class="btn subtle" id="refreshBtn">새로고침</button>
    <button class="btn subtle" onclick="location.href='submit.html'">자기소개 작성</button>
    <span class="count" id="countLabel"></span>
  </div>

  <div class="grid" id="grid">
    <p class="empty">불러오는 중...</p>
  </div>

  <script src="card-render.js"></script>
  <script>
    const grid       = document.getElementById("grid");
    const refreshBtn = document.getElementById("refreshBtn");
    const countLabel = document.getElementById("countLabel");

    function buildAddCard() {
      return `
        <div class="card add" id="addCard" role="button" tabindex="0" aria-label="자기소개 추가">
          <div class="plus">+</div>
          <div class="label">자기소개 추가</div>
          <div class="hint">눌러서 작성하러 가기</div>
        </div>`;
    }

    async function load() {
      refreshBtn.disabled = true;
      refreshBtn.textContent = "불러오는 중...";
      grid.innerHTML = `<p class="empty">데이터를 불러오는 중입니다...</p>`;
      countLabel.textContent = "";

      try {
        const [cfgRes, dataRes] = await Promise.all([
          fetch(`${API_URL}?action=config`),
          fetch(`${API_URL}?action=data`),
        ]);
        const [cfg, dataJson] = await Promise.all([cfgRes.json(), dataRes.json()]);
        if (cfg.result !== "success") throw new Error("설정 로드 실패");
        if (dataJson.result !== "success") throw new Error("데이터 로드 실패");

        const fields = (cfg.fields || []).filter(f => f.type !== "image");
        const rows   = (dataJson.data || []).slice().reverse();

        if (rows.length === 0) {
          grid.innerHTML = `<p class="empty">아직 자기소개가 없습니다.<br>+ 카드를 눌러 추가해보세요.</p>` + buildAddCard();
          countLabel.textContent = "";
          return;
        }

        grid.innerHTML = rows.map(r => buildCard(r, fields)).join("") + buildAddCard();
        countLabel.textContent = `총 ${rows.length}명`;

      } catch (err) {
        console.error("로드 오류:", err);
        grid.innerHTML = `<p class="empty">❌ 불러오지 못했습니다.<br>${escapeHtml(err.message)}</p>`;
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.textContent = "새로고침";
      }
    }

    document.addEventListener("click", e => {
      if (e.target.closest?.("#addCard")) location.href = "submit.html";
    });

    refreshBtn.addEventListener("click", load);
    load();
  </script>
</body>
</html>
