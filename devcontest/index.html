<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Event — 개발자 행사 모아보기</title>
<style>
  :root {
    --bg:          #070711;
    --card:        rgba(18,18,34,0.8);
    --card-border: rgba(255,255,255,0.07);
    --card-hover:  #1a1a30;
    --text:        #e2e8f0;
    --text2:       #94a3b8;
    --text3:       #64748b;
    --accent:      #6366f1;
    --accent2:     #8b5cf6;
    --urgent:      #ef4444;
    --warning:     #f59e0b;
    --ok:          #22c55e;
    --radius:      16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Hero */
  .hero {
    position: relative;
    overflow: hidden;
    padding: 56px 24px 48px;
    text-align: center;
    background: linear-gradient(135deg, #0f0f25 0%, #1a0f3e 50%, #0f1825 100%);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -80px; left: 50%; transform: translateX(-50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse, rgba(99,102,241,.22) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(99,102,241,.15);
    border: 1px solid rgba(99,102,241,.3);
    border-radius: 99px;
    padding: 5px 14px;
    font-size: 12px;
    color: #a5b4fc;
    letter-spacing: .05em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .hero h1 {
    font-size: clamp(28px,5vw,48px);
    font-weight: 800;
    letter-spacing: -.03em;
    background: linear-gradient(135deg,#c7d2fe 0%,#a5b4fc 40%,#818cf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }
  .hero-sub { color: var(--text2); font-size: 15px; margin-bottom: 32px; }
  .updated-info {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text3);
    font-size: 13px;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ok);
    flex-shrink: 0;
  }
  .dot.loading { background: var(--warning); animation: blink .8s infinite; }
  .dot.error   { background: var(--urgent); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* Controls */
  .controls {
    position: sticky; top: 0; z-index: 100;
    background: rgba(7,7,17,.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--card-border);
    padding: 14px 24px;
  }
  .controls-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 10px;
  }
  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text3); pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 10px 14px 10px 42px;
    color: var(--text); font-size: 14px; outline: none;
    transition: border-color .2s, background .2s;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: rgba(99,102,241,.5); background: rgba(255,255,255,.07); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-label { color: var(--text3); font-size: 12px; white-space: nowrap; }
  .filter-chip {
    cursor: pointer;
    border: 1px solid var(--card-border);
    border-radius: 99px;
    padding: 3px 12px;
    font-size: 12px; color: var(--text2); background: transparent;
    transition: all .2s; white-space: nowrap; user-select: none;
  }
  .filter-chip:hover { background: rgba(255,255,255,.06); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Stats */
  .stats-bar {
    max-width: 1400px; margin: 0 auto;
    padding: 18px 24px 6px;
  }
  .stats-count { color: var(--text2); font-size: 13px; }
  .stats-count strong { color: var(--text); }

  /* Grid */
  .grid {
    max-width: 1400px; margin: 0 auto;
    padding: 8px 24px 64px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px,1fr));
    gap: 16px;
  }

  /* Card */
  .card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s, background .2s, border-color .2s;
    display: flex; flex-direction: column; gap: 10px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity .2s;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(99,102,241,.14); background: var(--card-hover); border-color: rgba(99,102,241,.3); }
  .card:hover::before { opacity: 1; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; min-height: 22px; }
  .tag { display:inline-block; padding:2px 9px; border-radius:99px; font-size:11px; font-weight:600; white-space:nowrap; }
  .tag-online    { background:rgba(59,130,246,.15); color:#93c5fd; border:1px solid rgba(59,130,246,.25); }
  .tag-offline   { background:rgba(139,92,246,.15); color:#c4b5fd; border:1px solid rgba(139,92,246,.25); }
  .tag-free      { background:rgba(34,197,94,.15);  color:#86efac; border:1px solid rgba(34,197,94,.25); }
  .tag-paid      { background:rgba(249,115,22,.15); color:#fdba74; border:1px solid rgba(249,115,22,.25); }
  .tag-ai        { background:rgba(236,72,153,.15); color:#f9a8d4; border:1px solid rgba(236,72,153,.25); }
  .tag-cloud     { background:rgba(6,182,212,.15);  color:#67e8f9; border:1px solid rgba(6,182,212,.25); }
  .tag-hackathon { background:rgba(234,179,8,.15);  color:#fde047; border:1px solid rgba(234,179,8,.25); }
  .tag-security  { background:rgba(239,68,68,.15);  color:#fca5a5; border:1px solid rgba(239,68,68,.25); }
  .tag-edu       { background:rgba(20,184,166,.15); color:#5eead4; border:1px solid rgba(20,184,166,.25); }
  .tag-seminar   { background:rgba(167,139,250,.15);color:#c4b5fd; border:1px solid rgba(167,139,250,.25); }
  .tag-contest   { background:rgba(251,113,133,.15);color:#fda4af; border:1px solid rgba(251,113,133,.25); }
  .tag-default   { background:rgba(100,116,139,.15);color:#94a3b8; border:1px solid rgba(100,116,139,.25); }
  .card-title { font-size:15px; font-weight:700; color:var(--text); line-height:1.5; letter-spacing:-.01em; }
  .card-organizer { font-size:12px; color:var(--text3); display:flex; align-items:center; gap:4px; }
  .card-footer {
    display:flex; align-items:flex-end; justify-content:space-between; gap:8px;
    margin-top:auto; padding-top:10px; border-top:1px solid rgba(255,255,255,.05);
  }
  .card-date { font-size:12px; color:var(--text3); line-height:1.5; flex:1; }
  .card-date strong { display:block; color:var(--text2); font-size:10px; font-weight:600; margin-bottom:2px; letter-spacing:.05em; text-transform:uppercase; }

  /* Badges */
  .badge { flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; padding:5px 11px; border-radius:10px; font-size:13px; font-weight:800; letter-spacing:-.02em; min-width:62px; white-space:nowrap; }
  .badge-urgent  { background:rgba(239,68,68,.2); color:#f87171; border:1px solid rgba(239,68,68,.4); animation:badge-pulse 1.4s infinite; }
  @keyframes badge-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)} 50%{box-shadow:0 0 0 5px rgba(239,68,68,0)} }
  .badge-warning { background:rgba(245,158,11,.2); color:#fbbf24; border:1px solid rgba(245,158,11,.4); }
  .badge-normal  { background:rgba(59,130,246,.2);  color:#60a5fa; border:1px solid rgba(59,130,246,.3); }
  .badge-safe    { background:rgba(34,197,94,.15);  color:#4ade80; border:1px solid rgba(34,197,94,.3); }
  .badge-closed  { background:rgba(100,116,139,.15);color:var(--text3);border:1px solid rgba(100,116,139,.2); }

  /* Skeleton */
  .skeleton-card {
    background:rgba(18,18,34,.8); border:1px solid var(--card-border);
    border-radius:var(--radius); padding:20px;
    display:flex; flex-direction:column; gap:12px;
  }
  .skel {
    background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);
    background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* Empty / Error */
  .empty { grid-column:1/-1; text-align:center; padding:80px 24px; color:var(--text3); }
  .empty-icon { font-size:48px; margin-bottom:16px; }
  .empty h3 { color:var(--text2); margin-bottom:8px; }
  .error-box { grid-column:1/-1; max-width:500px; margin:40px auto; padding:28px; background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.25); border-radius:var(--radius); color:#fca5a5; text-align:center; }
  .error-box h3 { margin-bottom:10px; font-size:16px; }
  .error-box p { font-size:14px; line-height:1.6; }

  @media(max-width:640px) {
    .hero { padding:40px 16px 36px; }
    .controls { padding:12px 16px; }
    .stats-bar { padding:14px 16px 4px; }
    .grid { padding:8px 16px 48px; gap:12px; }
    .card { padding:16px; }
  }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-badge">✦ 개발자 행사 모아보기</div>
  <h1>Dev Event</h1>
  <p class="hero-sub">개발 공모전 · 해커톤 · 세미나 한눈에 보기</p>
  <div class="updated-info">
    <span class="dot loading" id="dot"></span>
    <span id="updated-time">데이터 불러오는 중...</span>
  </div>
</header>

<div class="controls" id="controls" style="display:none">
  <div class="controls-inner">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" class="search-input" type="text"
        placeholder="행사명 또는 주최 검색..."
        oninput="onSearch(this.value)" autocomplete="off">
    </div>
    <div class="filters" id="filter-chips">
      <span class="filter-label">필터</span>
    </div>
  </div>
</div>

<div class="stats-bar" id="stats-bar" style="display:none">
  <p class="stats-count" id="stats-text"></p>
</div>

<div class="grid" id="skeleton-wrap"></div>
<div class="grid" id="grid" style="display:none"></div>

<script>
// ── Markdown Parser ──────────────────────────────────────────────────────────

const README_URL = 'https://raw.githubusercontent.com/brave-people/Dev-Event/master/README.md';
const CACHE_KEY  = 'dev_event_cache';
const STOP_KW    = ['동아리','커뮤니티','개발 교육','개발자 모임','Contributors','contributor'];

function parseDate(s, year) {
  const m = s.match(/(\d{1,2})\.\s*(\d{1,2})/);
  if (!m) return null;
  const mo = parseInt(m[1]), d = parseInt(m[2]);
  if (mo < 1 || mo > 12 || d < 1 || d > 31) return null;
  return `${year}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function parseEvents(text) {
  const events = [];
  let year = 0, month = 0;
  const lines = text.split('\n');
  let i = 0;

  while (i < lines.length) {
    const s = lines[i].trim();

    // Stop at community/edu sections
    if (s.startsWith('## ') && !s.includes('년') && !s.includes('월')) {
      if (STOP_KW.some(k => s.includes(k))) break;
      i++; continue;
    }

    // Month header: ## `26년 03월`
    const mh = s.match(/^##\s+`(\d{2})년\s+(\d{2})월`/);
    if (mh) { year = 2000 + parseInt(mh[1]); month = parseInt(mh[2]); i++; continue; }

    // Event: - __[Title](URL)__
    const eh = s.match(/^-\s+__\[(.+?)\]\((.+?)\)__\s*$/);
    if (eh && year) {
      const ev = {
        title: eh[1], url: eh[2],
        year, month,
        tags: [], organizer: '',
        deadline: null, event_date: null,
        deadline_str: '', event_date_str: '',
      };
      i++;
      while (i < lines.length) {
        const sub = lines[i].trim();
        if (!sub) { i++; break; }
        if (sub.startsWith('- __') || sub.startsWith('##')) break;
        if (!sub.startsWith('-')) { i++; continue; }

        const field = sub.replace(/^-+\s*/, '');
        if (field.startsWith('분류:'))
          ev.tags = [...field.matchAll(/`([^`]+)`/g)].map(m => m[1]);
        else if (field.startsWith('주최:'))
          ev.organizer = field.slice(3).trim();
        else if (field.startsWith('접수:')) {
          const val = field.slice(3).trim();
          ev.deadline_str = val;
          const parts = val.split('~').map(p => p.trim());
          ev.deadline = parseDate(parts[parts.length-1], year);
        } else if (field.startsWith('일시:')) {
          const val = field.slice(3).trim();
          ev.event_date_str = val;
          const parts = val.split('~').map(p => p.trim());
          ev.event_date = parseDate(parts[0], year);
        }
        i++;
      }
      events.push(ev);
    } else {
      i++;
    }
  }
  return events;
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function loadEvents() {
  // Check localStorage cache
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (raw) {
      const cached = JSON.parse(raw);
      if (cached.date === todayStr()) return { events: cached.events, fresh: false };
    }
  } catch(e) {}

  // Fetch fresh
  const res = await fetch(README_URL);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();

  const all = parseEvents(text);
  const today = todayStr();

  // Filter past events
  const active = all.filter(ev => {
    const d = ev.deadline || ev.event_date;
    return !d || d >= today;
  });

  // Sort earliest deadline first
  active.sort((a,b) => {
    const da = a.deadline || a.event_date || '9999-99-99';
    const db = b.deadline || b.event_date || '9999-99-99';
    return da < db ? -1 : da > db ? 1 : 0;
  });

  // Save cache
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ date: today, events: active })); } catch(e) {}
  return { events: active, fresh: true };
}

// ── Render ───────────────────────────────────────────────────────────────────

const TAG_CLASS = {
  '온라인':'online','오프라인':'offline','무료':'free','유료':'paid',
  'AI':'ai','클라우드':'cloud','해커톤':'hackathon','보안':'security',
  '교육':'edu','세미나':'seminar','대회':'contest',
};
function getTagClass(t) {
  if (TAG_CLASS[t]) return TAG_CLASS[t];
  if (t.startsWith('오프라인')) return 'offline';
  if (/AI|인공지능/.test(t)) return 'ai';
  if (t.includes('클라우드')) return 'cloud';
  if (t.includes('해커톤')) return 'hackathon';
  if (t.includes('보안')) return 'security';
  if (t.includes('교육')) return 'edu';
  if (t.includes('세미나')) return 'seminar';
  if (t.includes('대회') || t.includes('공모전')) return 'contest';
  return 'default';
}

function getDays(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  return Math.round((d - today) / 86400000);
}

function badge(ev) {
  const ds = ev.deadline || ev.event_date;
  if (!ds) return null;
  const days = getDays(ds);
  if (days === null) return null;
  if (days < 0)   return { cls:'closed',  text:'마감' };
  if (days === 0)  return { cls:'urgent',  text:'D-Day' };
  if (days <= 3)   return { cls:'urgent',  text:'D-'+days };
  if (days <= 7)   return { cls:'warning', text:'D-'+days };
  if (days <= 30)  return { cls:'normal',  text:'D-'+days };
  return               { cls:'safe',    text:'D-'+days };
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cardHTML(ev) {
  const b = badge(ev);
  const dateStr = ev.deadline_str || ev.event_date_str;
  const dateLabel = ev.deadline ? '접수 마감' : '행사 일시';
  const tags = ev.tags.map(t => `<span class="tag tag-${getTagClass(t)}">${esc(t)}</span>`).join('');
  return `
    <div class="card" onclick="window.open('${esc(ev.url)}','_blank')">
      <div class="card-tags">${tags}</div>
      <h3 class="card-title">${esc(ev.title)}</h3>
      ${ev.organizer ? `<p class="card-organizer">🏢 ${esc(ev.organizer)}</p>` : ''}
      <div class="card-footer">
        ${dateStr ? `<div class="card-date"><strong>${dateLabel}</strong>${esc(dateStr)}</div>` : '<div></div>'}
        ${b ? `<span class="badge badge-${b.cls}">${b.text}</span>` : ''}
      </div>
    </div>`;
}

// ── State ────────────────────────────────────────────────────────────────────

let allEvents = [];
let activeFilters = new Set();
let searchQuery = '';

function filtered() {
  let evs = allEvents;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    evs = evs.filter(e => e.title.toLowerCase().includes(q) || e.organizer.toLowerCase().includes(q));
  }
  if (activeFilters.size > 0) evs = evs.filter(e => e.tags.some(t => activeFilters.has(t)));
  return evs;
}

function renderCards() {
  const evs = filtered();
  document.getElementById('stats-text').innerHTML =
    `<strong>${evs.length}개</strong> 행사 표시 중${allEvents.length !== evs.length ? ` (전체 ${allEvents.length}개)` : ''}`;

  document.getElementById('grid').innerHTML = evs.length === 0
    ? `<div class="empty"><div class="empty-icon">🔍</div><h3>검색 결과가 없어요</h3><p>다른 키워드로 검색해보세요.</p></div>`
    : evs.map(cardHTML).join('');
}

function buildFilters(events) {
  const counts = {};
  events.forEach(e => e.tags.forEach(t => { counts[t] = (counts[t]||0)+1; }));
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,18).map(([t])=>t);
  const wrap = document.getElementById('filter-chips');
  top.forEach(tag => {
    const chip = document.createElement('span');
    chip.className = 'filter-chip';
    chip.textContent = tag;
    chip.onclick = () => {
      activeFilters.has(tag) ? (activeFilters.delete(tag), chip.classList.remove('active'))
                             : (activeFilters.add(tag),    chip.classList.add('active'));
      renderCards();
    };
    wrap.appendChild(chip);
  });
}

function onSearch(v) { searchQuery = v.trim(); renderCards(); }

function today9am() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}.${m}.${day} 09:00 업데이트`;
}

// ── Init ─────────────────────────────────────────────────────────────────────

// Skeleton
const skelCard = `
<div class="skeleton-card">
  <div class="skel" style="height:20px;width:60%"></div>
  <div class="skel" style="height:40px;width:90%"></div>
  <div class="skel" style="height:14px;width:40%"></div>
  <div style="display:flex;justify-content:space-between;align-items:flex-end;padding-top:10px;border-top:1px solid rgba(255,255,255,.05)">
    <div class="skel" style="height:30px;width:55%"></div>
    <div class="skel" style="height:32px;width:64px;border-radius:10px"></div>
  </div>
</div>`;
document.getElementById('skeleton-wrap').innerHTML = skelCard.repeat(6);

loadEvents().then(({ events }) => {
  allEvents = events;

  // Hide skeleton, show UI
  document.getElementById('skeleton-wrap').style.display = 'none';
  document.getElementById('controls').style.display = '';
  document.getElementById('stats-bar').style.display = '';
  document.getElementById('grid').style.display = '';

  const dot = document.getElementById('dot');
  dot.classList.remove('loading');
  document.getElementById('updated-time').textContent = today9am();

  buildFilters(events);
  renderCards();
}).catch(err => {
  document.getElementById('skeleton-wrap').style.display = 'none';
  document.getElementById('grid').style.display = '';
  document.getElementById('grid').innerHTML = `
    <div class="error-box">
      <h3>⚠️ 데이터를 불러오지 못했어요</h3>
      <p>네트워크 연결을 확인하거나<br>잠시 후 새로고침 해보세요.<br><br>
      <small style="color:var(--text3)">${err.message}</small></p>
    </div>`;
  const dot = document.getElementById('dot');
  dot.classList.remove('loading');
  dot.classList.add('error');
  document.getElementById('updated-time').textContent = '불러오기 실패';
});
</script>
</body>
</html>
